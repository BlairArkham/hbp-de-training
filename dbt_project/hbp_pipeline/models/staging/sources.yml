version: 2

sources:

  # =========================
  # RAW INGESTION LAYER
  # =========================
  - name: raw
    database: HBP_RAW
    schema: INGEST
    description: "Raw ingestion layer from COPY INTO / Python pipelines"

    tables:

      - name: CUSTOMERS
        description: "Customer master data"
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null

      - name: ORDERS
        description: "Order transactions"
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: status
            tests:
              - accepted_values:
                  arguments:
                    values: ['completed', 'pending', 'cancelled', 'refunded']

      - name: PRODUCTS
        description: "Product catalog"
        columns:
          - name: product_id
            tests:
              - unique
              - not_null

      - name: SUPPORT_TICKETS
        description: "Customer support ticket data"
        columns:
          - name: ticket_id
            tests:
              - unique
              - not_null
          - name: customer_id
          - name: status
            tests:
              - accepted_values:
                  arguments:
                    values: ['open', 'resolved', 'closed']

  # =========================
  # FIVETRAN LAYER
  # =========================
  - name: fivetran_supplier
    database: HBP_RAW
    schema: GOOGLE_SHEETS
    description: "Supplier contact data ingested via Fivetran from Google Sheets"

    loaded_at_field: _fivetran_synced

    freshness:
      warn_after:
        count: 24
        period: hour
      error_after:
        count: 48
        period: hour

    tables:
      - name: SUPPLIER_CONTACTS
        description: "Supplier contact information maintained in Google Sheets"
        columns:
          - name: supplier_id
            tests:
              - unique
              - not_null