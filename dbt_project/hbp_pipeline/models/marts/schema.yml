version: 2

models:

  - name: mart_customer_summary
    description: >
      Gold layer customer summary mart.
      One row per customer combining demographic details
      with aggregated order performance metrics.

    columns:

      - name: customer_id
        description: Unique identifier for each customer.
        tests:
          - unique
          - not_null

      - name: email
        description: Customer email address used for contact and identification.
        tests:
          - unique
          - not_null

      - name: first_name
        description: Customer's first name.

      - name: last_name
        description: Customer's last name.

      - name: country
        description: Country of residence (ISO format from staging layer).

      - name: created_at
        description: Date the customer record was created.

      - name: is_active
        description: Indicates whether the customer is active.

      - name: total_spend_pence
        description: Total spend across completed orders in pence.

      - name: spend_rank
        description: Ranking of customers based on total spend (1 = highest spender).

      - name: spend_dense_rank
        description: Dense ranking of customers based on total spend.

      - name: dbt_updated_at
        description: Timestamp showing when the mart was last refreshed.


  # =========================================================
  # CAPSTONE ADDITION: SUPPORT SUMMARY MART
  # =========================================================

  - name: mart_support_summary
    description: >
      Gold layer customer health mart combining financial performance
      from orders and operational performance from support tickets.
      Used by commercial teams to identify churn risk and customer health.

    columns:

      - name: customer_id
        description: Unique identifier for each customer.
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: email
        description: Customer email address used for communication.
        tests:
          - not_null

      - name: total_spend_pence
        description: Total customer spend across completed orders.

      - name: spend_rank
        description: Ranking of customers based on total spend.

      - name: spend_dense_rank
        description: Dense ranking of customers based on spend.

      - name: total_tickets
        description: Total number of support tickets raised by customer.

      - name: open_tickets
        description: Number of unresolved support tickets.

      - name: resolved_tickets
        description: Number of resolved support tickets.

      - name: high_priority_tickets
        description: Number of high priority support tickets.

      - name: avg_days_to_resolve
        description: Average resolution time for support tickets (in days).

      - name: customer_health
        description: >
          Business classification of customer health based on spend
          and support ticket activity (HEALTHY, AT_RISK, CRITICAL, UNSTABLE, STANDARD).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - HEALTHY
                  - AT_RISK
                  - CRITICAL
                  - UNSTABLE
                  - STANDARD

      - name: dbt_updated_at
        description: Timestamp showing when the mart was last refreshed.